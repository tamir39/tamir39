name: generate snake

on:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: generate snake svgs
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=22D3EE&color_dots=00000000,1F2937,8B5CF6,22D3EE,F5F5F5
            dist/github-contribution-grid-snake-dark.svg?color_snake=22D3EE&color_dots=00000000,1F2937,8B5CF6,22D3EE,F5F5F5

      - name: push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
